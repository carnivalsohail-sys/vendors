<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Vendor Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
font-family:Inter,Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:16px;
background:#040509;
overflow-y:auto;
position:relative;
}

/* background glow */
body::before,
body::after{
content:"";
position:fixed;
width:320px;
height:320px;
border-radius:50%;
filter:blur(90px);
opacity:.14;
animation:floatGlow 10s ease-in-out infinite alternate;
z-index:0;
}

body::before{
background:#7a2cff;
top:-100px;
left:-100px;
}

body::after{
background:#00aaff;
right:-100px;
bottom:-100px;
animation-delay:2s;
}

@keyframes floatGlow{
0%{transform:translate(0,0) scale(1);}
100%{transform:translate(35px,25px) scale(1.18);}
}

/* main card */
.panel{
position:relative;
z-index:2;
width:100%;
max-width:430px;
padding:26px;
border-radius:28px;
background:rgba(255,255,255,.04);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.06);
box-shadow:0 20px 50px rgba(0,0,0,.45);
animation:panelIn .8s ease;
margin:20px 0;
}

@keyframes panelIn{
from{opacity:0;transform:translateY(25px) scale(.96);}
to{opacity:1;transform:translateY(0) scale(1);}
}

.top{
margin-bottom:20px;
text-align:center;
}

.kicker{
font-size:11px;
letter-spacing:3px;
color:#8ea0ff;
opacity:.8;
margin-bottom:8px;
}

h1{
font-size:32px;
font-weight:700;
color:#fff;
line-height:1.1;
}

/* list */
.list{
display:grid;
gap:12px;
}

.card{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
padding:16px;
border-radius:20px;
text-decoration:none;
color:#fff;
background:rgba(255,255,255,.025);
border:1px solid rgba(255,255,255,.05);
transition:.22s ease;
opacity:0;
transform:translateY(20px);
animation:cardIn .7s ease forwards;
}

.card:nth-child(1){animation-delay:.10s;}
.card:nth-child(2){animation-delay:.15s;}
.card:nth-child(3){animation-delay:.20s;}
.card:nth-child(4){animation-delay:.25s;}
.card:nth-child(5){animation-delay:.30s;}
.card:nth-child(6){animation-delay:.35s;}
.card:nth-child(7){animation-delay:.40s;}

@keyframes cardIn{
to{
opacity:1;
transform:translateY(0);
}
}

.card:hover,
.card:active{
transform:scale(.98);
background:rgba(255,255,255,.045);
}

.left{
display:flex;
align-items:center;
gap:12px;
min-width:0;
}

.icon{
width:46px;
height:46px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:600;
flex-shrink:0;
animation:pulse 3s ease-in-out infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.06);}
}

.text{
min-width:0;
}

.text strong{
display:block;
font-size:16px;
font-weight:600;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.text span{
display:block;
font-size:11px;
letter-spacing:1px;
opacity:.55;
margin-top:4px;
text-transform:uppercase;
}

.arrow{
font-size:22px;
opacity:.55;
flex-shrink:0;
animation:arrowMove 1.6s ease-in-out infinite;
}

@keyframes arrowMove{
0%,100%{transform:translateX(0);}
50%{transform:translateX(4px);}
}

/* colors */
.ravi .icon{ background:linear-gradient(135deg,#00d47a,#009d5a); }
.bashir .icon{ background:linear-gradient(135deg,#3575ff,#0094e8); }
.shabbir .icon{ background:linear-gradient(135deg,#d72a80,#6d2cff); }
.shiv .icon{ background:linear-gradient(135deg,#ff8a00,#e52e71); }
.jinam .icon{ background:linear-gradient(135deg,#00c6ff,#0072ff); }
.generator .icon{ background:linear-gradient(135deg,#f12711,#f5af19); }
.prasad .icon{ background:linear-gradient(135deg,#11998e,#38ef7d); }

/* mobile */
@media (max-width:480px){
body{
padding:12px;
}

.panel{
padding:20px;
border-radius:24px;
margin:10px 0;
}

h1{
font-size:28px;
}

.card{
padding:14px;
border-radius:18px;
}

.icon{
width:42px;
height:42px;
font-size:18px;
}

.text strong{
font-size:15px;
}

.text span{
font-size:10px;
}

.arrow{
font-size:20px;
}

}
</style>
</head>
